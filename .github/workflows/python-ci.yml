name: Python CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  syntax-check:
    name: Syntax and package check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile Python files
        run: |
          python -m compileall src scripts -q

      - name: Import package
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          root = Path.cwd()
          sys.path.insert(0, str(root / "src"))

          import ml_signal  # noqa: F401

          print("ml_signal package import OK")
          PY
